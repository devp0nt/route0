name: CI

on:
  push:
    branches: [main, next]

permissions:
  contents: write # <-- allows pushing tags/commits
  issues: write # <-- needed for GitHub release notes
  pull-requests: write
  id-token: write # <-- required for OIDC/Trusted Publisher

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, '--skip-ci')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Bun latest
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run types

      - name: Build
        run: bun run build:all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            dist/
            dist-test/
            package.json
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
          - 18
          - 20
          - 22
          - 24
        bun:
          - latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-files
          path: .

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test:all

  release:
    needs: test
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next') &&
      !contains(github.event.head_commit.message, '--skip-ci')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release requires full history

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@devp0nt'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-files
          path: .

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure npm 11.5.1+ for OIDC support
        run: npm install -g npm@latest

      - name: Extract npm OIDC token from .npmrc for semantic-release
        run: |
          # npm CLI automatically creates .npmrc with OIDC token when registry-url is set
          # and id-token: write permission is enabled
          NPMRC_PATH=$(npm config get userconfig)
          echo "npmrc location: $NPMRC_PATH"

          if [ -f "$NPMRC_PATH" ]; then
            # Extract the OIDC token from .npmrc
            TOKEN=$(grep -E '^//registry\.npmjs\.org/:_authToken=' "$NPMRC_PATH" | sed 's/.*=//' || echo '')
            
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "undefined" ] && [ "$TOKEN" != "null" ]; then
              echo "NPM_TOKEN=$TOKEN" >> $GITHUB_ENV
              echo "✓ Extracted OIDC token from .npmrc"
            else
              echo "✗ Could not extract token from $NPMRC_PATH"
              echo "File contents (redacted):"
              cat "$NPMRC_PATH" | sed 's/\(authToken=\).*/\1***REDACTED***/'
              exit 1
            fi
          else
            echo "✗ .npmrc file not found at $NPMRC_PATH"
            echo "npm version: $(npm --version)"
            echo "npm config:"
            npm config list
            exit 1
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
        run: npx semantic-release
